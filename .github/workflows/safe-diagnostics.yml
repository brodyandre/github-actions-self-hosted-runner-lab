name: safe-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar diagnóstico seguro
        run: |
          chmod +x scripts/*.sh
          ./scripts/safe-diagnostics.sh
